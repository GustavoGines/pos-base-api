name: Release Backend

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, bcmath, curl, zip
          
      - name: Install dependencies
        run: composer install --optimize-autoloader --no-dev
        
      - name: Package Release
        run: |
          zip -r update_backend_${{ github.ref_name }}.zip . -x ".git/*" -x "*.git*" -x ".env*" -x "storage/*" -x "tests/*" -x "node_modules/*"
          
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp update_backend_${{ github.ref_name }}.zip s3://${{ secrets.R2_BUCKET_NAME }}/update_backend_${{ github.ref_name }}.zip --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          
      - name: Notify License Server
        run: |
          # Leer el changelog directamente del archivo CHANGELOG.md
          VERSION_NO_V=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          MSG=$(awk "/^## \[${VERSION_NO_V}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed -e '/^---/d' | awk 'NF {print} !NF {if (p) print ""; p=1}' | sed '/^$/N;/^\n$/D')
          if [ -z "$MSG" ]; then MSG="Release ${{ github.ref_name }} generado automaticamente por CI/CD."; fi
          jq -n \
            --arg version "${{ github.ref_name }}" \
            --arg component "backend" \
            --arg url "${{ secrets.R2_PUBLIC_BASE_URL }}/update_backend_${{ github.ref_name }}.zip" \
            --arg changelog "$MSG" \
            --arg token "${{ secrets.LICENSE_SERVER_TOKEN }}" \
            '{version: $version, component: $component, download_url: $url, changelog: $changelog, is_critical: false, token: $token}' > payload.json
            
          curl -X POST "${{ secrets.LICENSE_SERVER_URL }}/api/releases/new" \
          -H "Content-Type: application/json" \
          -d @payload.json
