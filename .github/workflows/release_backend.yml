name: Release Backend

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, bcmath, curl, zip
          
      - name: Install dependencies
        run: composer install --optimize-autoloader --no-dev
        
      - name: Package Release
        run: |
          zip -r update_backend_${{ github.ref_name }}.zip . -x ".git/*" -x "*.git*" -x ".env*" -x "storage/*" -x "tests/*" -x "node_modules/*"
          
      - name: Setup AWS CLI for Cloudflare R2
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload to Cloudflare R2
        run: |
          aws s3 cp update_backend_${{ github.ref_name }}.zip s3://${{ secrets.R2_BUCKET_NAME }}/update_backend_${{ github.ref_name }}.zip --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          
      - name: Notify License Server
        run: |
          curl -X POST "${{ secrets.LICENSE_SERVER_URL }}/api/releases/new" \
          -H "Content-Type: application/json" \
          -d '{
            "version": "${{ github.ref_name }}",
            "component": "backend",
            "download_url": "${{ secrets.R2_PUBLIC_BASE_URL }}/update_backend_${{ github.ref_name }}.zip",
            "changelog": "Auto-generated backend release for ${{ github.ref_name }}",
            "is_critical": false,
            "token": "${{ secrets.LICENSE_SERVER_TOKEN }}"
          }'
